apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-broker
spec:
  serviceName: {{ .Release.Name }}-headless
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
        - name: broker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.broker.port }}
              name: broker
            - containerPort: {{ .Values.broker.metricsPort }}
              name: metrics
          env:
            - name: DMQ_BROKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: DMQ_BROKER_PORT
              value: "{{ .Values.broker.port }}"
            - name: DMQ_METRICS_PORT
              value: "{{ .Values.broker.metricsPort }}"
            - name: DMQ_DATA_DIR
              value: {{ .Values.broker.dataDir }}
          readinessProbe:
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.broker.dataDir }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
