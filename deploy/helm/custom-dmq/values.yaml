replicaCount: 3

image:
  repository: ghcr.io/lkpjohn2026/custom-dmq
  tag: v2.0.0
  pullPolicy: IfNotPresent

broker:
  port: 7777
  metricsPort: 9080
  dataDir: /data

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

persistence:
  enabled: true
  size: 1Gi

service:
  type: ClusterIP
