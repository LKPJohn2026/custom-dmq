name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binaries
        run: cargo build --release -p dmq-cli -p dmq-stress
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: dmq-binaries
          path: |
            target/release/custom-dmq
            target/release/dmq-broker
            target/release/dmq-produce
            target/release/dmq-consume
            target/release/dmq-admin
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push container
        env:
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          IMAGE_REPO="ghcr.io/$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          docker build -t "${IMAGE_REPO}:${IMAGE_TAG}" .
          docker push "${IMAGE_REPO}:${IMAGE_TAG}"
